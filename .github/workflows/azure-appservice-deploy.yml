# Deploy LeaseLense.Web to Azure App Service on push to main.
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   AZURE_CREDENTIALS  — JSON output of: az ad sp create-for-rbac --name "github-lease-lense" --role contributor --scopes /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Web/sites/{app} --sdk-auth
#   AZURE_WEBAPP_NAME  — App Service name only (e.g. my-app, not the full URL)
#
# App Service must use the same stack as the project (Linux + .NET 10). Configure
# connection strings and Key Vault in Azure Portal or IaC, not in this workflow.

name: Azure App Service deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-appservice-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION: "LeaseLense.slnx"
  WEB_PROJECT: "src/LeaseLense.Web/LeaseLense.Web.csproj"
  PUBLISH_DIR: "publish_output"
  ARTIFACT_NAME: "leaselense-web"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --configuration Release --no-build --verbosity normal

      - name: Publish web app
        run: dotnet publish ${{ env.WEB_PROJECT }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          url="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health/db"
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$url" || true)
          if [ "$code" != "200" ]; then
            echo "Health check failed: HTTP $code"
            cat /tmp/health.json 2>/dev/null || true
            exit 1
          fi
          echo "Health check OK"
